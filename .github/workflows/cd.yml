name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
      
      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.18.0
    
      - name: Build application
        run: ./scripts/buildprod.sh  

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
        
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Build and push Docker image
        run: |
          gcloud builds submit --tag us-central1-docker.pkg.dev/project-8e5f78b6-a0df-4128-8f4/notely-ar-repo/notely:latest .
      
      - name: Run database migrations
        run: ./scripts/migrateup.sh

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/project-8e5f78b6-a0df-4128-8f4/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project project-8e5f78b6-a0df-4128-8f4 --max-instances=4

    